<!DOCTYPE html>
<html layout:decorator="thymeleaf/layout/layout_blank">
<head>
<title layout:title-pattern="$LAYOUT_TITLE : $CONTENT_TITLE">[(#{title.sr.srGroup})] - [(#{title.regist})]</title>
</head>
<body>

	<div layout:fragment="content">
		<section class="content">
			<div class="container-fluid">
				<div class="row mt-2">
					<div class="col-lg-12">
						<div class="card card-primary card-outline">
							<div class="card-header">
								<h5 class="card-title m-0" data-th-text="#{title.regist}"></h5>
							</div>
							<div class="card-body">
								<form id="input-form" class="">
									<div class="row">
										<div class="col-sm-4">
											<!-- text input -->
											<div class="form-group">
												<label for="EMAIL">[(#{label.srGroup.email})] <i class="fas fa-check text-danger"></i></label>
												<input type="email" id="EMAIL" name="EMAIL" class="form-control" required="required">
												<input type="hidden" id="TOWER_TYPE_CD" name="TOWER_TYPE_CD" class="form-control" required="required">											
											</div>
										</div>
										<div class="col-sm-4">
											<!-- text input -->
											<div class="form-group">
												<label for="NAME">[(#{label.srGroup.name})] <i class="fas fa-check text-danger"></i></label>
												<input type="text" id="NAME" name="NAME" class="form-control" required="required">
											</div>
										</div>
										<div class="col-sm-4">
											<!-- text input -->
											<div class="form-group">
												<label for="PHONE">[(#{label.srGroup.phone})] <i class="fas fa-check text-danger"></i></label>
												<input type="number" id="PHONE" name="PHONE" class="form-control" required="required">
											</div>
										</div>
									</div>
								</form>
							</div>
							<div class="card-footer">
								<div class="row">
									<div class="col-sm-12">
										<div class="text-center">
											<button type="button" class="btn btn-sm btn-primary" data-action-button="regist" data-th-text="#{button.regist}"></button>
											<button type="button" class="btn btn-sm btn-outline-primary" data-action-button="cancel" data-th-text="#{button.cancel}"></button>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
					<!-- /.col-lg-12 -->
				</div>
				<!-- /.row -->
			</div>
		</section>
	</div>

	<th:block layout:fragment="script">
		<script>
			$(function() {
				var form = $("#input-form");
				var validator = form.validate();
				
				$(form).find('[name="TOWER_TYPE_CD"]').val('[(${TOWER_TYPE_CD})]');
				
				// 프로세스 처리 함수
				$.fn.executeAction = function(procType) {
					switch(procType) {
						case 'validate' :	// 정합성 체크
							if(form.valid()) {
								$.fn.executeAction('regist');
							}
							
							break;
						case 'regist' :		// 등록
							var formData = {};
							$(form).serializeArray().map(function(x) {formData[x.name] = x.value;});
							// 폼 데이터 전송
							$.sendData({
								url: '/sr/srGroup/registData',
								data: formData,
								notification: true,
								isIframe: true
							}, function(data) {
								if(data.result == 'S') {
									parent.$('#list').get(0).contentWindow.location.reload();
									
									$.fn.executeAction('cancel');
								}
							});
							
							break;
						case 'cancel' :		// 취소
							var activeTab = parent.tabsComp.tabs('getSelected');
							var activeIdx = parent.tabsComp.tabs('getTabIndex', activeTab);
							parent.tabsComp.tabs('close', activeIdx);
							
							break;
						default :
							;
					}
				}
				
				// 버튼 이벤트
				$('[data-action-button]').on('click', function() {
					$(this).executeAction($(this).data('action-button'));
				});
			});
		</script>
	</th:block>
</body>
</html>
