<!DOCTYPE html>
<html layout:decorator="thymeleaf/layout/layout_blank">
<head>
<title layout:title-pattern="$LAYOUT_TITLE : $CONTENT_TITLE">[(#{title.detail})] - [(#{title.regist})]</title>
</head>
<body>
	<div layout:fragment="content">
		<section class="content">
			<div class="container-fluid">
				<div class="row mt-2">
					<div class="col-lg-12">
						<div class="card card-primary card-outline card-outline-tabs">
							<div class="card-header p-0 border-bottom-0">
								<ul class="nav nav-tabs" id="custom-tabs-one-tab" role="tablist">
									<li class="nav-item">
										<a class="nav-link active" id="bill-data-upload-tab" data-toggle="pill" href="#bill-data-upload" role="tab" aria-controls="bill-data-upload" aria-selected="true">[(#{label.detail.upload})]</a>
									</li>
									<li class="nav-item">
										<a class="nav-link disabled" id="bill-data-validate-tab" data-toggle="pill" href="#bill-data-validate" role="tab" aria-controls="bill-data-validate" aria-selected="false">[(#{label.detail.validate})]</a>
									</li>
								</ul>
							</div>
							<div class="card-body">
								<div class="tab-content">
									<div class="tab-pane fade show active" id="bill-data-upload" role="tabpanel" aria-labelledby="bill-data-upload-tab">
										<form id="input-form" enctype="multipart/form-data">
											<input type="hidden" name="dataList">
											<div class="row">
												<div class="col-sm-4">
													<div class="form-group">
														<label for="BILL_MONTH">[(#{label.detail.bill.month})] <i class="fas fa-check text-danger"></i></label>
														<div class="input-group date" id="BILL_MONTH" data-target-input="nearest">
									                        <input type="text" name="BILL_MONTH" class="form-control datetimepicker-input" data-toggle="datetimepicker" data-target="#BILL_MONTH" required="required">
									                        <div class="input-group-append" data-target="#BILL_MONTH" data-toggle="datetimepicker">
									                            <div class="input-group-text"><i class="fa fa-calendar"></i></div>
									                        </div>
									                    </div>
													</div>
												</div>
											</div>
											<div class="row">
												<div class="col-sm-4">
													<div class="form-group">
														<label for="BILL_FILE">[(#{label.detail.upload.file})] <i class="fas fa-check text-danger"></i></label>
														<div class="input-group">
															<div class="custom-file">
                        										<input type="file" class="custom-file-input" id="BILL_FILE" required="required">
                        										<label class="custom-file-label overflow-hidden" for="BILL_FILE">[(#{label.common.choose.file})]</label>
                      										</div>
                      									</div>
                      									<p class="text-primary"><i class="fas fa-exclamation-triangle"></i> 암호화된 파일은 암호 해제후 업로드 해 주세요.</p>
													</div>
												</div>
												<div class="col-sm-4">
													<div class="form-group">
														<label for="BILL_FILE_PASSWORD">[(#{label.detail.upload.file.password})] <i class="fas fa-check text-danger"></i></label>
														<input type="password" class="form-control" name="BILL_FILE_PASSWORD" id="BILL_FILE_PASSWORD" data-th-placeholder="#{label.detail.upload.file.password}">
													</div>
												</div>
											</div>
										</form>
										
										<div class="box">
											<div class="row">
												<div class="col-sm-12">
													<div class="text-left">
														<button type="button" class="btn btn-sm btn-primary" data-action-button="validate" data-th-text="#{button.upload}"></button>
														<button type="button" class="btn btn-sm btn-outline-primary" data-action-button="cancel" data-th-text="#{button.cancel}"></button>
													</div>
												</div>
											</div>
										</div>
									</div>
									<div class="tab-pane fade" id="bill-data-validate" role="tabpanel" aria-labelledby="bill-data-validate-tab">
										<div class="card">
											<div class="card-header">
												<h3 class="card-title font-weight-bold validate-month"></h3>
											</div>
											<div class="card-footer text-center">
												<button type="button" class="btn btn-sm btn-success" data-action-button="regist" data-th-text="#{button.regist}" disabled="disabled"></button>
												<button type="button" class="btn btn-sm btn-outline-danger" data-action-button="showMsg">
													[(#{button.error})]
													<span class="badge bg-danger error-count">0</span>
												</button>
												<button type="button" class="btn btn-sm btn-outline-primary" data-action-button="cancel" data-th-text="#{button.cancel}"></button>
											</div>
										</div>
										<div class="overflow-auto">
											<table id="dataTable" class="table nowrap table-sm table-bordered table-hover table-striped">
												<thead>
													<tr>
														<th data-th-text="#{label.detail.row.no}"></th>
														<th data-th-text="#{label.detail.contractType}"></th>
														<th data-th-text="#{label.detail.contractNo}"></th>
														<th data-th-text="#{label.detail.chargeType}"></th>
														<th data-th-text="#{label.detail.resourceCategory}"></th>
														<th data-th-text="#{label.detail.towerType}"></th>
														<th data-th-text="#{label.detail.usage}"></th>
														<th data-th-text="#{label.detail.rate}"></th>
														<th data-th-text="#{label.detail.applyRate}"></th>
														<th data-th-text="#{label.detail.serviceDays}"></th>
														<th data-th-text="#{label.detail.days}"></th>
														<th data-th-text="#{label.detail.amount}"></th>
														<th data-th-text="#{label.detail.usageTpmc}"></th>
														<th data-th-text="#{label.detail.remark}"></th>
														<th data-th-text="#{label.detail.serviceApplyDate}"></th>
														<th data-th-text="#{label.detail.serviceApplySeq}"></th>
													</tr>
												</thead>
											</table>
										</div>
									</div>
								</div>
							</div>
              				<!-- /.card -->
						</div>
					</div>
					<!-- /.col-lg-12 -->
				</div>
				<!-- /.row -->
			</div>
		</section>
	</div>

	<th:block layout:fragment="script">
		<script th:src="@{/adminlte/plugins/bs-custom-file-input/bs-custom-file-input.min.js}"></script>
		<script>
			$(function() {
				var form = $("#input-form");
				var validator = form.validate();
				var uploadData = [];
				var errorCnt = 0;
				var errorMsg = [];
				
				bsCustomFileInput.init();
				
				$('.overflow-auto').mousewheel(function(event, delta) {
					this.scrollLeft -= (delta * 30);
					event.preventDefault();
				});
				
				// 계약일자
				$('#BILL_MONTH').createDatePicker({
					format: 'YYYY/MM',
					mode: 'months'
				});
				
				// 조회결과 테이블 생성
				var dataTable = $('#dataTable').createDataTable({
					bPaginate: false,
					dom: 'ifrt',
					columns: [
						{data : "BILL_MONTH_SEQ"},
						{data : "CONTRACT_TYPE_CD_NM"},
						{data : "CONTRACT_NO"},
						{data : "CHARGE_TYPE_CD_NM"},
						{data : "RESOURCE_CATEGORY_CD_NM"},
						{data : "TOWER_TYPE_CD_NM"},
						{data : "USAGE"},
						{data : "RATE"},
						{data : "APPLY_RATE"},
						{data : "SERVICE_DAYS"},
						{data : "DAYS"},
						{data : "AMOUNT"},
						{data : "USAGE_TPMC"},
						{data : "REMARK"},
						{data : "SERVICE_APPLY_DATE"},
						{data : "SERVICE_APPLY_SEQ"}
					],
					columnDefs: [
						{
							targets: [0],
							className: 'text-center'
						},
						{
							targets: [1],
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = '';
								
								if(full['CONTRACT_TYPE_CD' + '-VALID']) {
									valid = full['CONTRACT_TYPE_CD' + '-VALID'];
									$(_td).addClass(valid);
									
									errorCnt++;
									errorMsg.push(full['CONTRACT_TYPE_CD' + '-MSG']);
								}
								
								if(full['CONTRACT_TYPE_CD_NM' + '-VALID']) {
									valid = full['CONTRACT_TYPE_CD_NM' + '-VALID'];
									$(_td).addClass(valid);
									
									errorCnt++;
									errorMsg.push(full['CONTRACT_TYPE_CD_NM' + '-MSG']);
								}
								
								return data;
							}
						},
						{
							targets: [2],
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['CONTRACT_NO' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['CONTRACT_NO' + '-MSG']);
								}
								
								return data;
							}
						},
						{
							targets: [3],
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = '';
								
								if(full['CHARGE_TYPE_CD' + '-VALID']) {
									valid = full['CHARGE_TYPE_CD' + '-VALID'];
									$(_td).addClass(valid);
									
									errorCnt++;
									errorMsg.push(full['CHARGE_TYPE_CD' + '-MSG']);
								}
								
								if(full['CHARGE_TYPE_CD_NM' + '-VALID']) {
									valid = full['CHARGE_TYPE_CD_NM' + '-VALID'];
									$(_td).addClass(valid);
									
									errorCnt++;
									errorMsg.push(full['CHARGE_TYPE_CD_NM' + '-MSG']);
								}
								
								return data;
							}
						},
						{
							targets: [4],
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = '';
								
								if(full['RESOURCE_CATEGORY_CD' + '-VALID']) {
									valid = full['RESOURCE_CATEGORY_CD' + '-VALID'];
									$(_td).addClass(valid);
									
									errorCnt++;
									errorMsg.push(full['RESOURCE_CATEGORY_CD' + '-MSG']);
								}
								
								if(full['RESOURCE_CATEGORY_CD_NM' + '-VALID']) {
									valid = full['RESOURCE_CATEGORY_CD_NM' + '-VALID'];
									$(_td).addClass(valid);
									
									errorCnt++;
									errorMsg.push(full['RESOURCE_CATEGORY_CD_NM' + '-MSG']);
								}
								
								if(full['BASELINE_ID' + '-VALID']) {
									valid = full['BASELINE_ID' + '-VALID'];
									$(_td).addClass(valid);
									
									errorCnt++;
									errorMsg.push(full['BASELINE_ID' + '-MSG']);
								}
								
								return data;
							}
						},
						{
							targets: [5],
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = '';
								
								if(full['TOWER_TYPE_CD' + '-VALID']) {
									valid = full['TOWER_TYPE_CD' + '-VALID'];
									$(_td).addClass(valid);
									
									errorCnt++;
									errorMsg.push(full['TOWER_TYPE_CD' + '-MSG']);
								}
								
								if(full['TOWER_TYPE_CD_NM' + '-VALID']) {
									valid = full['TOWER_TYPE_CD_NM' + '-VALID'];
									$(_td).addClass(valid);
									
									errorCnt++;
									errorMsg.push(full['TOWER_TYPE_CD_NM' + '-MSG']);
								}
								
								return data;
							}
						},
						{
							targets: [6],
							className: 'text-right',
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['USAGE' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['USAGE' + '-MSG']);
								}
								
								return $.setComma(data);
							}
						},
						{
							targets: [7],
							className: 'text-right',
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['RATE' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['RATE' + '-MSG']);
								}
								
								return $.setComma(data);
							}
						},
						{
							targets: [8],
							className: 'text-right',
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['APPLY_RATE' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['APPLY_RATE' + '-MSG']);
								}
								
								return $.setComma(data);
							}
						},
						{
							targets: [9],
							className: 'text-right',
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['SERVICE_DAYS' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['SERVICE_DAYS' + '-MSG']);
								}
								
								return $.setComma(data);
							}
						},
						{
							targets: [10],
							className: 'text-right',
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['DAYS' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['DAYS' + '-MSG']);
								}
								
								return $.setComma(data);
							}
						},
						{
							targets: [11],
							className: 'text-right',
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['AMOUNT' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['AMOUNT' + '-MSG']);
								}
								
								return $.setComma(data);
							}
						},
						{
							targets: [12],
							className: 'text-right',
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['USAGE_TPMC' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['USAGE_TPMC' + '-MSG']);
								}
								
								return $.setComma(data);
							}
						},
						{
							targets: [13],
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['REMARK' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['REMARK' + '-MSG']);
								}
								
								return data;
							}
						},
						{
							targets: [14],
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['SERVICE_APPLY_DATE' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['SERVICE_APPLY_DATE' + '-MSG']);
								}
								
								return data;
							}
						},
						{
							targets: [15],
							render: function ( data, type, full, meta ) {
								var _td = $('#dataTable').DataTable().cell(meta.row, meta.col).nodes();
								var valid = full['SERVICE_APPLY_SEQ' + '-VALID'];
								$(_td).addClass(valid);
								
								if(valid) {
									errorCnt++;
									errorMsg.push(full['SERVICE_APPLY_SEQ' + '-MSG']);
								}
								
								return data;
							}
						}
					],
					callback: function() {
						$('.error-count').text(errorCnt);
						
						if(errorCnt == 0) {
							$('[data-action-button="regist"]').removeAttr('disabled');
						} else {
							$('[data-action-button="regist"]').attr('disabled', 'disabled');
						}
			        }
				});
				
				// 프로세스 처리 함수
				$.fn.executeAction = function(procType) {
					switch(procType) {
						case 'validate' :	// 정합성 체크
							if(form.valid()) {
								$.fn.executeAction('upload');
							}
							
							break;
						case 'upload' :		// 등록
							var formData = new FormData(form[0]);
							formData.append('BILL_FILE', $('#BILL_FILE')[0].files[0]);
							
							$('.card').loading({display: true});
							
							// 폼 데이터 전송
							$.sendAttachData({
								url: '/bill/detailUpload/upload',
								data: formData,
								notification: true,
								isIframe: true
							}, function(data) {
								$('.card').loading({display: false});
								
								errorCnt = 0;
								errorMsg = [];
								
								if(data.result == 'S') {
									dataTable.clear();
									dataTable.rows.add(data.dataList).draw();
									
									uploadData = data.dataList;
									
									$.fn.executeAction('validateUploadData');
								}
							});
							
							break;
						case 'validateUploadData' :	// 업로드 데이터 정합성 체크
							$('#bill-data-validate-tab').removeClass('disabled').tab('show');
							
							break;
						case 'regist' :		// 등록
							var formData = {};
							$(form).serializeArray().map(function(x) {formData[x.name] = x.value;});
							
							formData['dataList'] = uploadData;
							
							$('.card').loading({display: true});
							
							// 폼 데이터 전송
							$.sendData({
								url: '/bill/detail/registData',
								data: formData,
								notification: true
							}, function(data) {
								$('.card').loading({display: false});
								
								if(data.result == 'S') {
									parent.$('#list').get(0).contentWindow.location.reload();
									
									var activeTab = parent.tabsComp.tabs('getSelected');
									var activeIdx = parent.tabsComp.tabs('getTabIndex', activeTab);
									parent.tabsComp.tabs('close', activeIdx);
								}
							});
							
							break;
						case 'cancel' :		// 취소
							var activeTabId = $('.nav-tabs .nav-link.active').attr('id');
						
							if('bill-data-upload-tab' == activeTabId) {
								var activeTab = parent.tabsComp.tabs('getSelected');
								var activeIdx = parent.tabsComp.tabs('getTabIndex', activeTab);
								parent.tabsComp.tabs('close', activeIdx);
							} else {
								$('#dataTable tbody').html('<tr><td valign="top" colspan="16" class="dataTables_empty">[(#{msg.empty.data})]</td></tr>');
								
								$('#bill-data-validate-tab').addClass('disabled');
								$('#bill-data-upload-tab').tab('show');
							}
							
							break;
						case 'showMsg' : // 에러메시지 출력
							if(errorCnt > 0) {
								$(document).Toasts('create', {
									class: 'bg-danger',
									title: '[(#{button.error})]',
									body: errorMsg.join('<br>')
								});
							}
						
							break;
						default :
							;
					}
				}
				
				// 버튼 이벤트
				$('[data-action-button]').on('click', function() {
					$(this).executeAction($(this).data('action-button'));
				});
			});
		</script>
	</th:block>
</body>
</html>
