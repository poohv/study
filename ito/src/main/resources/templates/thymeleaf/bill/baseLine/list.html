							</div>
							<div class="card-body">

											<div class="form-group row">

									<div class="row">
										<div class="col-sm-4">
											<!-- text input -->
											<div class="form-group row">
												<label for="RESOURCE_CATEGORY_CD_NM" class="col-sm-4 col-form-label" data-th-text="#{label.rate.resourceCategory}"></label>
												<div class="input-group col-sm-8">

							<div class="card-header">

								<div class="card-tools">
									<button type="button" class="btn btn-sm btn-success" data-action-button="save">[(#{button.save})]</button>
								</div>
							</div>
							<!-- /.card-header -->
							<div class="card-body">
								<form id="data-form">
									<table id="dataTable" class="table table-sm table-bordered table-hover table-striped">
										<thead>
											<tr>
												<th data-th-text="#{label.resource.resourceCategory}"></th>
												<th data-th-text="#{label.baseLine.svcMonth}"></th>
												<th data-th-text="#{label.baseLine.ea}"></th>
											</tr>

	<th:block layout:fragment="script">
		<script>
			$(function() {
				var form = $("#search-form");
				var dataForm = $("#data-form");
				var validator = form.validate({
					errorPlacement: function(error, element) {
						if ( element.hasClass( "select2" )) {
							$(element).next().find('span span').addClass('is-invalid');
						}
					}
				});
				var validatorList = dataForm.validate();
				var selectedRowData;
				
				// 년월
				$('#SVC_MONTH').createDatePicker({
					format: 'YYYY/MM',
					mode: 'months'
				});
				
				// 팝업 생성
				$('#RESOURCE_CATEGORY_CD_NM').createPopup({
					type: 'baseline',
					title: '리소스 카테고리',
					code_id: 'BASELINE_ID',
					code_nm: 'RESOURCE_CATEGORY_CD_NM'
				});
				

				// 조회결과 테이블 생성
				var dataTable = $('#dataTable').createDataTable({
					bPaginate: false,
					dom: 'frt',
					columns: [
						{data : "RESOURCE_CATEGORY_CD_NM"},
						{data : "SVC_MONTH"},
						{data : "QUANTITY"} 
					],
					columnDefs: [
						{
							targets: [0],
							className: 'text-center',
						},
						{
							targets: [1],
							className: 'text-center'
						},
						{
							targets: [2],
							className: 'text-center',
							render: function ( data, type, full ) {
								var colContent = '';
								colContent += '<div class="input-group">';
								colContent += '    <input type="number" name="QUANTITY" class="form-control contract-rate" value="'+data+'" required="required">';
								colContent += '</div>';
								
								return colContent;
							}
						}
					],
					callback: function() {
						// 금액 마스크 처리
						$('.contract-rate').inputmask('numeric', {
							groupSeparator: ',',
							autoGroup: true
						});
					}
				});
				
				// 폼 전송 이벤트
				form.submit(function(e) {
				    e.preventDefault();
				    
				    if(validator.valid()) {
				    	// 베이스라인 ID 체크
				    	if($('[name="BASELINE_ID"]').val() == '') {
				    		return false;
				    	}
				    } else {
				    	return false;
				    }
				    
				    $(this).find('.select2').next().find('span span').removeClass('is-invalid');
				    
				    $.fn.executeAction('search');
				});
				
				// 프로세스 처리 함수
				$.fn.executeAction = function(procType) {
					switch(procType) {
						case 'clearResult' :	// 조회결과 초기화
							$('#dataTable tbody').html('<tr><td valign="top" colspan="2" class="dataTables_empty">[(#{msg.empty.data})]</td></tr>');
							
							break;
						case 'reset' :			// 조회조건 초기화
							form[0].reset();
							form.find('[type="hidden"]').val('');
							form.find("select").trigger("change");
							
							$('[data-action-button="save"]').attr('disabled', 'disabled');
							
							dataTable.rows().remove().draw();
							
							break;
						case 'save' :			// 저장
							var formData = {};
							$(form).serializeArray().map(function(x) {formData[x.name] = x.value;});
							formData['QUANTITY'] = dataForm.find('[name="QUANTITY"]').val();
							
							if(!form.valid() || !dataForm.valid()) {
								return false;
							}
							
							// 폼 데이터 전송
							$.sendData({
								url: '/bill/baseLine/registData',
								data: formData,
								notification: true,
								isIframe: true
							});
						
							break;
						case 'search' :			// 조회
							$('[data-action-button="save"]').attr('disabled', 'disabled');
						
							dataTable.rows().remove().draw();
						
							$.sendData({
								type: 'GET',
								data: form.serialize(),
								url: '/bill/baseLine/findOne'
							}, function(result) {
								var formData = {};
								$(form).serializeArray().map(function(x) {formData[x.name] = x.value;});
								
								formData['QUANTITY'] = result['QUANTITY'];
								
								dataTable.rows().remove().draw();
								dataTable.rows.add([formData]).draw();
								
								$('[data-action-button="save"]').removeAttr('disabled');
							});
					    	
							break;
						default :
							;
					}
				}
				
				// 버튼 이벤트
				$(document).on('click', '[data-action-button]', function() {
					$(this).executeAction($(this).data('action-button'));
				});
			});
		</script>
	</th:block>
</body>
</html>
