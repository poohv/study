<!DOCTYPE html>
<html layout:decorator="thymeleaf/layout/layout_blank">
<head>
<title layout:title-pattern="$LAYOUT_TITLE : $CONTENT_TITLE">[(#{title.contract})] - [(#{title.list})]</title>
</head>
<body>
	<div layout:fragment="content">
		<section class="content">
			<div class="container-fluid mt-2">
				<div class="row">
					<div class="col-lg-12">
						<div class="card card-primary card-outline">
							<div class="card-header">
								<h5 class="card-title m-0" data-th-text="#{title.search}"></h5>
							</div>
							<div class="card-body">
								<form id="search-form" class="form-horizontal">
									<div class="row">
										<div class="col-sm-4">
											<!-- text input -->
											<div class="form-group row">
												<label for="CONTRACT_TYPE_CD" class="col-sm-4 col-form-label" data-th-text="#{label.contract.contractType}"></label>
												<div class="col-sm-8">
													<select id="CONTRACT_TYPE_CD" name="CONTRACT_TYPE_CD"
														class="form-control select2">
														<option value="" selected="selected"
															data-th-text="#{label.common.all}"></option>
													</select>
												</div>
											</div>
										</div>
										<div class="col-sm-4">
											<!-- text input -->
											<div class="form-group row">
												<label for="CONTRACT_NO" class="col-sm-4 col-form-label" data-th-text="#{label.contract.contractTypeNo}"></label>
												<div class="col-sm-8">
													<input type="text" id="CONTRACT_NO" name="CONTRACT_NO" class="form-control">
												</div>
											</div>
										</div>
										<div class="col-sm-4">
											<!-- text input -->
											<div class="form-group row">
												<label for="CONTRACT_NAME" class="col-sm-4 col-form-label" data-th-text="#{label.contract.contractName}"></label>
												<div class="col-sm-8">
													<input type="search" id="CONTRACT_NAME" name="CONTRACT_NAME" class="form-control">
												</div>
											</div>
										</div>
									</div>
									<div class="row">
										<div class="col-sm-12">
											<div class="text-center">
												<button type="submit" class="btn btn-sm btn-primary" data-th-text="#{button.search}"></button>
												<button type="button" class="btn btn-sm btn-outline-primary" data-action-button="reset" data-th-text="#{button.reset}"></button>
											</div>
										</div>
									</div>
								</form>
							</div>
						</div>
					</div>
					<!-- /.col-lg-12 -->
				</div>
				<!-- /.row -->

				<div class="row">
					<div class="col-lg-12">
						<div class="card card-primary card-outline">
							<div class="card-header">
								<h3 class="card-title" data-th-text="#{title.list}"></h3>
								<div class="card-tools">
									<button type="button" class="btn btn-sm btn-success" data-action-button="new">[(#{button.new})]</button>
								</div>
							</div>
							<!-- /.card-header -->
							<div class="card-body">
								<table id="dataTable" class="table table-sm table-bordered table-hover table-striped">
									<thead>
										<tr>
											<th data-th-text="#{label.contract.contractTypeCd}"></th>
											<th data-th-text="#{label.contract.contractTypeCdNm}"></th>
											<th data-th-text="#{label.contract.contractTypeNo}"></th>
											<th data-th-text="#{label.contract.contractName}"></th>
											<th data-th-text="#{label.contract.contractDate}"></th>
											<th data-th-text="#{label.contract.amount}"></th>
											<th data-th-text="#{label.contract.startDate}"></th>
											<th data-th-text="#{label.contract.endDate}"></th>
										</tr>
									</thead>
								</table>
							</div>
							<!-- /.card-body -->
						</div>
					</div>
				</div>
			</div>
		</section>
	</div>

	<th:block layout:fragment="script">
		<script>
			$(function() {
				var form = $("#search-form");
				var validator = form.validate();
				var selectedRowData;
				
				// 공통코드 콤보박스 생성
				$('select[name="CONTRACT_TYPE_CD"]').createSelectBox({
					code_id : 'CONTRACT_TYPE'
				});

				// 조회결과 테이블 생성
				var dataTable = $('#dataTable').createDataTable({
						url: _ctx + "/bill/contract/dataList",
						params: {},
						columns: [
							{data : "CONTRACT_TYPE_CD"},
							{data : "CONTRACT_TYPE_CD_NM"},
							{data : "CONTRACT_NO"},
							{data : "CONTRACT_NAME"},
							{data : "CONTRACT_DATE"},
							{data : "AMOUNT"},
							{data : "START_DATE"},
							{data : "END_DATE"},
							{data : "TB_CONTRACTID"}
						],
						columnDefs: [
							{
								targets: [0],
								visible: false
							},
							{
								targets: [5],
								className: 'text-right'
							},
							{
								targets: [8],
								visible: false
							},
						]
				});
				
				// 폼 전송 이벤트
				form.submit(function(e) {
				    e.preventDefault();
				    $.fn.executeAction('search');
				});
				
				// 프로세스 처리 함수
				$.fn.executeAction = function(procType) {
					switch(procType) {
						case 'reset' :		// 조회조건 초기화
							form[0].reset();
							form.find("select").trigger("change");
							break;
						case 'new' :		// 신규
							parent.tabsComp.createTabs({
								id: 'new',
								title: '[(#{button.new})]',
								isIframe: true,
								url: _ctx + '/bill/contract/regist',
								method: 'add',
								closable: true
							});
						
							break;
						case 'update' :		// 수정
							parent.tabsComp.createTabs({
								id: 'update_' + selectedRowData['TB_CONTRACTID'],
								title: selectedRowData['CONTRACT_TYPE_CD_NM'] + '[' + selectedRowData['CONTRACT_NO'] + ']',
								isIframe: true,
								url: _ctx + '/bill/contract/update',
								method: 'add',
								closable: true,
								sendData: {
									CONTRACT_TYPE_CD: selectedRowData['CONTRACT_TYPE_CD'],
									CONTRACT_NO: selectedRowData['CONTRACT_NO']
								}
							});
						
							break;
						case 'search' :
							var dataTableParams = form.serialize();
					    	dataTable.ajax.url(_ctx + '/bill/contract/dataList?' + dataTableParams).draw();
							break;
						default :
							;
					}
				}
				
				// 버튼 이벤트
				$('[data-action-button]').on('click', function() {
					$(this).executeAction($(this).data('action-button'));
				});
				
				// 목록 더블클릭 이벤트
				$('#dataTable tbody').on('dblclick', 'tr', function() {
					selectedRowData = dataTable.row(this).data();
					
					if(selectedRowData) {
						$.fn.executeAction('update');
					}
				});
			});
		</script>
	</th:block>
</body>
</html>
