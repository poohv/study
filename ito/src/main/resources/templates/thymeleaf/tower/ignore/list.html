<!DOCTYPE html>
<html layout:decorator="thymeleaf/layout/layout_blank">
<head>
<title layout:title-pattern="$LAYOUT_TITLE : $CONTENT_TITLE">[(#{title.resource})] - [(#{title.list})]</title>
</head>
<body>
	<div layout:fragment="content">
		<section class="content">
			<div class="container-fluid mt-2">
				<div class="row">
					<div class="col-lg-12">
						<div class="card card-primary card-outline">
							<div class="card-header">
								<h5 class="card-title m-0" data-th-text="#{title.search}"></h5>
							</div>
							<div class="card-body">
								<form id="search-form" class="form-horizontal">
									<input type="hidden" name="SEARCH_MONTH" class="form-control">
									<div class="row">
										<div class="col-sm-4">
											<!-- text input -->
											<div class="form-group row">
												<label for="INPUT_DATE" class="col-sm-4 col-form-label" data-th-text="#{label.ignore.date}"></label>
												<div class="col-sm-8">
													<div class="input-group date" id="INPUT_DATE" data-target-input="nearest">
								                        <input type="text" class="form-control datetimepicker-input" data-toggle="datetimepicker" data-target="#INPUT_DATE" name="INPUT_DATE" required="required"/>
								                        <div class="input-group-append" data-target="#INPUT_DATE" data-toggle="datetimepicker">
								                            <div class="input-group-text d-block"><i class="fa fa-calendar"></i></div>
								                        </div>
								                    </div>
								                </div>
											</div>
										</div>
									</div>
									<div class="row">
										<div class="col-sm-12">
											<div class="text-center">
												<button type="submit" class="btn btn-sm btn-primary" data-th-text="#{button.search}"></button>
												<button type="button" class="btn btn-sm btn-outline-primary" data-action-button="reset" data-th-text="#{button.reset}"></button>
											</div>
										</div>
									</div>
								</form>
							</div>
						</div>
					</div>
					<!-- /.col-lg-12 -->
				</div>
				<!-- /.row -->

				<div class="row">
					<div class="col-lg-12">
						<div class="card card-primary card-outline">
							<div class="card-header">
								<h3 class="card-title" data-th-text="#{title.list}"></h3>
							</div>
							<div class="card-body">
								<div class="row">
									<div class="col-sm-6">
										<h6 class="font-weight-bold">날짜 선택 : </h6>
						                <button type="button" class="btn btn-sm btn-success btn-block" data-action-button="add">[(#{label.ignore.batchAdd})]</button>
										<div id="date"></div>
									</div>
									<div class="col-sm-6">
										<table id="dataTable" class="table table-sm table-bordered table-hover table-striped">
											<colgroup>
												<col width="80">
												<col>
											</colgroup>
											<thead>
												<tr>
													<th>[(#{label.common.delete})]</th>
													<th data-th-text="#{label.ignore.ignoreDate}"></th>
												</tr>
											</thead>
										</table>
									</div>
								</div>
							</div>
							<!-- /.card-body -->
						</div>
					</div>
				</div>
			</div>
		</section>
	</div>

	<th:block layout:fragment="script">
		<script th:src="@{/adminlte/plugins/bs-custom-file-input/bs-custom-file-input.min.js}"></script>
		<script>
			$(function() {
				var form = $("#search-form");
				var validator = form.validate({
					errorPlacement: function(error, element) {
						if ( element.hasClass( "select2" )) {
							$(element).next().find('span span').addClass('is-invalid');
						}
					}
				});
				
				$('#date').createDatePicker({	
					inline : true,
					format: 'YYYY-MM-DD'
				});
				
			    $('#INPUT_DATE').createDatePicker({
			    	format: 'YYYY/MM',
			    	mode: 'months',
			    	defaultDate: new Date()
			    });

				// 조회결과 테이블 생성
				var dataTable = $('#dataTable').createDataTable({
					bPaginate: false,
					dom : '<"row"<"col-sm-6"i><"col-sm-6 text-right"B>frt',
					buttons: [
						{
							text: '[(#{button.save})]',
							className: 'btn-success',
							action: function(e, dt, node, config) {
								$.fn.executeAction('save');
							}
						},
						{
							text: '[(#{button.reset})]',
							action: function(e, dt, node, config) {
								dt.clear().draw();
							}
						}
					],
					columns: [
						{data : ""},
						{data : "IGNORE_DATE"}
					],
					columnDefs: [
						{
							targets: [0],
							className: 'text-center',
							orderable: false,
							data: null,
							defaultContent: '<button type="button" class="btn"><i class="fas fa-minus-circle text-danger"></i></button>'
						},
						{
							targets: [1],
							className: 'text-center',
							render: function ( data, type, full ) {
								return '<span>'+data+'</span><input type="hidden" name="IGNORE_DATE" value="'+full['IGNORE_DATE']+'">';
							}
						}
					],
					callback : function(){
						$('#dataTable tbody').sortable({
							placeholder : "bg-warning"
						}); 
					}
				});
				
				$('#dataTable tbody').on('click', '.btn', function() {
					dataTable.row($(this).parents('tr')).remove().draw();
				});
				
				// 폼 전송 이벤트
				form.submit(function(e) {
				    e.preventDefault();
				    
				    if(!validator.valid()) {
				    	return false;
				    }
				    
				    $.fn.executeAction('search');
				});
				
				// 프로세스 처리 함수
				$.fn.executeAction = function(procType) {
					switch(procType) {
						case 'reset' :		// 조회조건 초기화
							form[0].reset();
							form.find('[type="hidden"]').val('');
							form.find("select").trigger("change");
							
							dataTable.clear().draw();
							
							break;
						case 'search' :
							var formData = {};
							$(form).serializeArray().map(function(x) {formData[x.name] = x.value;});
					    	
					    	$.sendData({
								url: '/tower/ignore/dataList',
								data: formData,
								notification: true,
								isIframe: true
							}, function(data) {
								form.find('[name="SEARCH_MONTH"]').val(data['SEARCH_MONTH']);
								
								dataTable.clear();
								dataTable.rows.add(data.data).draw();
							});
					    	
							break;
						case 'add' :
							var ignoreDateArr = [];
							
							if(form.find('[name="SEARCH_MONTH"]').val() == '') {
								$.showAlert({
									type: 'error',
									msg: '[(#{msg.not.search})]'
								});
								
								return false;
							}
							
							$('#date .weekend').each(function() {
								ignoreDateArr.push($(this).data('day'));
							});
							
							$.addIgnoreDate(ignoreDateArr);
							
							break;	
						case 'save' :
							var dataArrayDate = [];
							
							$('#dataTable [name="IGNORE_DATE"]').each(function(idx, element) {
								dataArrayDate.push($(this).val());
							});
							
							if(dataArrayDate.length == 0) {
								if(!confirm('선택된 예외일자가 없을경우\n기존에 등록된 데이터가 삭제됩니다.\n\n저장 하시겠습니까?')) {
									return false;
								}
							}
							
							var formData = {};
							$(form).serializeArray().map(function(x) {formData[x.name] = x.value;});
							formData['IGNORE_DATE'] = dataArrayDate.join(',');
							
							// 폼 데이터 전송
							$.sendData({
								url: '/tower/ignore/saveIgnoreDate',
								data: formData,
								notification: true,
								isIframe: true
							}, function(data) {
								if(data.result == 'S') {
									var dataTableParams = form.serialize();
									dataTable.ajax.url(_ctx + '/tower/ignore/dataList?' + dataTableParams).draw();
								}
							});
							
							break;
						default :
							;
					}
				}
				
				// 예외일자 목록에 추가
				$.addIgnoreDate = function(dateArr) {
					var date = $('[name="INPUT_DATE"]').val();
					var ignoreDateArr = [];
					var ignoreDateMapArr = [];
					
					// 기존 목록 저장
					$('[name="IGNORE_DATE"]').each(function(idx, element) {
						ignoreDateArr.push($(this).val());
					});
					
					$(dateArr).each(function(i) {
						var weekend = moment(dateArr[i], 'MM/DD/YYYY', true);
						var selectMonth = moment(date, 'YYYY/MM', true);
						var wYM = weekend.year() + '/' + weekend.month();
						var sYM = selectMonth.year() + '/' + selectMonth.month();
						
						
						if(wYM == sYM) {
							var isExist = false;
							var weDate = weekend.format('YYYY/MM/DD');
							
							$(ignoreDateArr).each(function(idx) {
								if(weDate == ignoreDateArr[idx]) {
									isExist = true;
								}
							});
							
							if(!isExist) {
								ignoreDateArr.push(weDate);
							}
						}
					});
					
					ignoreDateArr.sort();
					
					$(ignoreDateArr).each(function(idx) {
						var ignoreDateMap = {};
						ignoreDateMap['IGNORE_DATE'] = ignoreDateArr[idx];
						ignoreDateMapArr.push(ignoreDateMap);
					});
					
					dataTable.clear();
					dataTable.rows.add(ignoreDateMapArr).draw();
				}
				
				// 버튼 이벤트
				$('[data-action-button]').on('click', function() {
					$(this).executeAction($(this).data('action-button'));
				});
				
				$('#date').on('change.datetimepicker',function(e){
					var date = moment(e.date, 'MM/DD/YYYY');
					$.addIgnoreDate([date]);
				});
				
			});
		</script>
	</th:block>
</body>
</html>
